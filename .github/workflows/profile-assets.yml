name: Update profile assets

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate live stats card
        env:
          GH_USERNAME: Jeyaprakashtech
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/generate-stats-card.js

      - name: Generate themed contribution graph
        env:
          GH_USERNAME: Jeyaprakashtech
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/generate-contribution-graph.js

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-card.svg assets/contribution-graph.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update live profile assets"
          git push
