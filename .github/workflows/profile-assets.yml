name: Update profile assets

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stats-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate live stats card
        env:
          GH_USERNAME: Jeyaprakashtech
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/generate-stats-card.js

      - name: Commit stats card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-card.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update live stats card"
          git push

  snake-animation:
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: Jeyaprakashtech
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
