<svg width="900" height="6" viewBox="0 0 900 6" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1E3D" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0B1E3D" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="2" width="900" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
