<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <!-- flat background, no gradient-stop animation -->
  <rect x="0" y="0" width="1200" height="320" rx="20" fill="#0B1E3D"/>

  <!-- soft glow blobs, decorative, drifting slowly -->
  <circle cx="1020" cy="60" r="140" fill="#2563EB" opacity="0.18">
    <animateTransform attributeName="transform" type="translate" values="0 0; -20 20; 0 0" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="280" r="110" fill="#60A5FA" opacity="0.12">
    <animateTransform attributeName="transform" type="translate" values="0 0; 20 -15; 0 0" dur="16s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- drifting particles -->
  <circle cx="900" cy="230" r="2.5" fill="#60A5FA" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -100; 0 0" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="270" r="1.8" fill="#93C5FD" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -80; 0 0" dur="11s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="200" r="2" fill="#2563EB" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -90; 0 0" dur="8s" begin="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- top accent line: visible by default, width animates as a bonus -->
  <rect x="0" y="0" width="1200" height="4" fill="#2563EB"/>

  <!-- name: visible by default (opacity 1), animation only adds a rise-in on top -->
  <text x="70" y="150" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" fill="#F8FAFC">
    Jeyaprakash S
    <animateTransform attributeName="transform" type="translate" values="0 16; 0 0" dur="0.9s" fill="freeze"/>
  </text>

  <!-- tagline: visible by default, opacity animates in on top from a non-zero floor -->
  <text x="70" y="200" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#93C5FD">
    Full-Stack Software Engineer - Backend . UI . Security
    <animate attributeName="opacity" values="0.15;1" dur="1.1s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- sub-tagline -->
  <text x="70" y="234" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CBD5E1">
    Shipping production software real businesses run on.
    <animate attributeName="opacity" values="0.15;1" dur="1.1s" begin="0.6s" fill="freeze"/>
  </text>

  <!-- border -->
  <rect x="1" y="1" width="1198" height="318" rx="20" fill="none" stroke="#2563EB" stroke-opacity="0.35"/>
</svg>
